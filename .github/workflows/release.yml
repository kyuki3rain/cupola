name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: cupola-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: cupola-aarch64-unknown-linux-gnu.tar.gz
            apt_packages: gcc-aarch64-linux-gnu libssl-dev:arm64
            linker: aarch64-linux-gnu-gcc
            pkg_config_allow_cross: "1"
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cross-compilation tools
        if: matrix.apt_packages
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.pkg_config_allow_cross || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path || '' }}

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.archive }} cupola
          mv ${{ matrix.archive }} ${{ github.workspace }}/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@44fd5ce4cd46d8d4bce3701a08a7e212a92d86b1 # v2
        with:
          files: ${{ matrix.archive }}
